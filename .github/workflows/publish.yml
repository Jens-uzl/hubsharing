name: Build and Deploy FHIR IG

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache IG Publisher
        uses: actions/cache@v4
        with:
          path: input-cache/publisher.jar
          key: publisher-jar-${{ hashFiles('.github/workflows/publish.yml') }}
      
      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ hashFiles('**/package-lock.json') }}
      
      - name: Cache gem packages
        uses: actions/cache@v4
        with:
          path: /var/lib/gems
          key: gem-cache-${{ hashFiles('**/Gemfile.lock') }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install SUSHI
        run: npm install -g fsh-sushi
        
      - name: Install Jekyll
        run: |
           sudo apt-get update
           sudo apt-get install -y ruby-full build-essential
           sudo gem install jekyll bundler

      - name: Download IG Publisher
        run: |
          mkdir -p input-cache
          curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar \
            -o input-cache/publisher.jar

      - name: Clear package cache                                                                                                          │
        run: |
          rm -rf ~/.fhir/packages/* || true 
        
      - name: Run IG Publisher
        run: |
          export JAVA_TOOL_OPTIONS="-Dfile.encoding=UTF-8"
          java -jar input-cache/publisher.jar -ig . -tx n/a

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
